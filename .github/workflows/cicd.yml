name: CI/CD Pipeline
on:
  push:
    branches:
      - main

env: 
  ACR_LOGIN_SERVER: yashprojectreg2026.azurecr.io 
  IMAGE_NAME: myapp 

jobs: 
  # ───────────────────────────────────────────── 
  # JOB 1: Provision Infrastructure
  # Recreates the App Service if it was deleted
  # ───────────────────────────────────────────── 
  provision:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep File
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: 'rg-myapp-cicd'
          template: ./main.bicep
          parameters: webAppName=yash-python-app

  # ───────────────────────────────────────────── 
  # JOB 2: Run tests 
  # ───────────────────────────────────────────── 
  test: 
    name: Run Tests 
    runs-on: ubuntu-latest 
    needs: provision  # Ensure infra exists before testing
 
    steps: 
      - name: Checkout code 
        uses: actions/checkout@v4 
 
      - name: Set up Python 
        uses: actions/setup-python@v5 
        with: 
          python-version: "3.11" 
 
      - name: Cache pip dependencies 
        uses: actions/cache@v4 
        with: 
          path: ~/.cache/pip 
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }} 
          restore-keys: | 
            ${{ runner.os }}-pip- 
 
      - name: Install dependencies 
        run: | 
          python -m pip install --upgrade pip 
          pip install -r requirements.txt 
 
      - name: Run pytest 
        run: | 
          pytest tests/ -v --tb=short 
 
  # ───────────────────────────────────────────── 
  # JOB 3: Build Docker image and push to ACR 
  # ───────────────────────────────────────────── 
  build-and-push: 
    name: Build and Push to ACR 
    runs-on: ubuntu-latest 
    needs: test 
    if: github.event_name == 'push' 
 
    steps: 
      - name: Checkout code 
        uses: actions/checkout@v4 
 
      - name: Log in to ACR 
        uses: docker/login-action@v3 
        with: 
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: yashprojectreg2026 
          # RECOMMENDED: Move password to GitHub Secrets as ACR_PASSWORD
          password: ${{ secrets.ACR_PASSWORD }} 
 
      - name: Set up Docker Buildx 
        uses: docker/setup-buildx-action@v3 
 
      - name: Extract Docker metadata 
        id: meta 
        uses: docker/metadata-action@v5 
        with: 
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }} 
          tags: | 
            type=raw,value=latest 
            type=sha,prefix=,format=short 
 
      - name: Build and push Docker image 
        uses: docker/build-push-action@v5 
        with: 
          context: . 
          push: true 
          tags: ${{ steps.meta.outputs.tags }} 
          labels: ${{ steps.meta.outputs.labels }} 
          cache-from: type=gha 
          cache-to: type=gha,mode=max 
 
  # ───────────────────────────────────────────── 
  # JOB 4: Deploy to Azure App Service
  # ───────────────────────────────────────────── 
  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    
    steps:
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'yash-python-app' 
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: '${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest'