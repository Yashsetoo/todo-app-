name: CI/CD Pipeline
on:
  push:
    branches:
      - main

env: 
  # Your ACR login server (e.g., myappregistry.azurecr.io) 
  ACR_LOGIN_SERVER: yashprojectreg2026.azurecr.io 
  # The name your Docker image will have inside ACR 
  IMAGE_NAME: myapp 
jobs: 
  # ───────────────────────────────────────────── 
  # JOB 1: Run tests 
  # ───────────────────────────────────────────── 
  test: 
    name: Run Tests 
    runs-on: ubuntu-latest  # GitHub provides a fresh Ubuntu VM for every run 
 
    steps: 
      # Step 1: Download your code onto the runner VM 
      - name: Checkout code 
        uses: actions/checkout@v4 
 
      # Step 2: Install Python 
      - name: Set up Python 
        uses: actions/setup-python@v5 
        with: 
          python-version: "3.11" 
 
      # Step 3: Cache pip packages (speeds up subsequent runs) 
      - name: Cache pip dependencies 
        uses: actions/cache@v4 
        with: 
          path: ~/.cache/pip 
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }} 
          restore-keys: | 
            ${{ runner.os }}-pip- 
 
      # Step 4: Install your app's dependencies 
      - name: Install dependencies 
        run: | 
          python -m pip install --upgrade pip 
          pip install -r requirements.txt 
 
      # Step 5: Run your tests 
      - name: Run pytest 
        run: | 
          pytest tests/ -v --tb=short 
 
  # ───────────────────────────────────────────── 
  # JOB 2: Build Docker image and push to ACR 
  # Only runs after tests PASS, and only on push to main (not PRs) 
  # ───────────────────────────────────────────── 
  build-and-push: 
    name: Build and Push to ACR 
    runs-on: ubuntu-latest 
    needs: test  # Wait for test job to succeed first 
    if: github.event_name == 'push'  # Skip this job on pull requests 
 
    steps: 
      # Step 1: Checkout code 
      - name: Checkout code 
        uses: actions/checkout@v4 
 
      # Step 2: Log in to your Azure Container Registry 
      - name: Log in to ACR 
        uses: docker/login-action@v3 
        with: 
          registry: yashprojectreg2026.azurecr.io 
          username: yashprojectreg2026 
          password: CZToOkZowf2yk1Wr6FbE7XjbhDVUQo34hyRc06EAiG3mFeR6gWaMJQQJ99CEACYeBjFEqg7NAAACAZCRBSCk 
 
      # Step 3: Set up Docker Buildx (enables advanced build features) 
      - name: Set up Docker Buildx 
        uses: docker/setup-buildx-action@v3 
 
      # Step 4: Generate image metadata (tags and labels) 
      # Tags the image with: latest + the short Git commit SHA 
      # Example: myappregistry.azurecr.io/myapp:latest 
      #          myappregistry.azurecr.io/myapp:a1b2c3d 
      - name: Extract Docker metadata 
        id: meta 
        uses: docker/metadata-action@v5 
        with: 
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }} 
          tags: | 
            type=raw,value=latest 
            type=sha,prefix=,format=short 
 
      # Step 5: Build the Docker image and push it to ACR 
      - name: Build and push Docker image 
        uses: docker/build-push-action@v5 
        with: 
          context: . 
          push: true 
          tags: ${{ steps.meta.outputs.tags }} 
          labels: ${{ steps.meta.outputs.labels }} 
          # Cache layers between runs to speed up builds 
          cache-from: type=gha 
          cache-to: type=gha,mode=max 
 
      # Step 6: Print a summary of what was pushed 
      - name: Print image digest 
        run: | 
          echo "   Image pushed successfully!" 
          echo "Registry: ${{ env.ACR_LOGIN_SERVER }}" 
          echo "Image: ${{ env.IMAGE_NAME }}" 
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  # ───────────────────────────────────────────── 
  # JOB 3: Deploy to Azure App Service
  # ───────────────────────────────────────────── 
  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    
    steps:
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'yash-python-app' 
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: '${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest'
jobs:
  provision:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep File
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: 'rg-myapp-cicd'
          template: ./main.bicep
          parameters: webAppName=yash-python-app